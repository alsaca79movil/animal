[production]

; ============================================================
; PHP SETTINGS
; ============================================================
phpSettings.display_startup_errors = 0
phpSettings.display_errors = 0

; ============================================================
; PATHS
; ============================================================
includePaths.library = APPLICATION_PATH "/../library"

; ============================================================
; BOOTSTRAP
; ============================================================
bootstrap.path  = APPLICATION_PATH "/Bootstrap.php"
bootstrap.class = "Bootstrap"
appnamespace    = "Application"

; ============================================================
; BASE DE DATOS (PDO MySQL)
; ============================================================
resources.db.adapter          = "PDO_MYSQL"
resources.db.params.host      = localhost
resources.db.params.username  = root
resources.db.params.password  =
resources.db.params.dbname    = animal2
resources.db.params.charset   = "utf8mb4"

; ============================================================
; DOCTRINE 2
; ============================================================
resources.doctrine.driver                    = pdo_mysql
resources.doctrine.entitiesPath              = APPLICATION_PATH "/../library"
resources.doctrine.entitiesPathNamespace     = "app\models"
resources.doctrine.proxiesPath               = APPLICATION_PATH "/../library/app/models/Proxies"
resources.doctrine.proxiesPathNamespace      = "app\models\Proxies"
resources.doctrine.repositoriesPath          = APPLICATION_PATH "/../library"
resources.doctrine.repositoriesPathNamespace = "app\models\Repositories"
resources.doctrine.cacheClass                = "Doctrine\Common\Cache\ApcCache"
resources.doctrine.connection.driver         = "pdo_mysql"
resources.doctrine.connection.host           = localhost
resources.doctrine.connection.user           = root
resources.doctrine.connection.password       =
resources.doctrine.connection.dbname         = animal2

; ============================================================
; FRONT CONTROLLER / MÓDULOS
; ============================================================
resources.modules = ""
resources.frontController.defaultModule                       = "default"
resources.frontController.moduleDirectory                     = APPLICATION_PATH "/modules"
resources.frontController.moduleControllerDirectoryName       = "controllers"
resources.frontController.params.prefixDefaultModule          = true
resources.frontController.params.displayExceptions            = 0

; Error Handler
resources.frontController.plugins.ErrorHandler.class                  = Zend_Controller_Plugin_ErrorHandler
resources.frontController.plugins.ErrorHandler.options.module         = consolidate
resources.frontController.plugins.ErrorHandler.options.controller     = error
resources.frontController.plugins.ErrorHandler.options.action         = error

; ============================================================
; SESSION
; ============================================================
resources.session.save_path       = APPLICATION_PATH "/../library/session"
resources.session.use_only_cookies = true
resources.session.cookie_lifetime  = 187400
; Descomentar si se sirve desde Ionic por iframe:
;resources.session.cookie_samesite = "None"
;resources.session.cookie_secure   = true

; ============================================================
; LAYOUT
; ============================================================
resources.layout.layoutPath = APPLICATION_PATH "/layouts/scripts/"

; ============================================================
; AUTOLOADER
; ============================================================
autoloadernamespaces[] = "App_"
autoloadernamespaces[] = "Doctrine"
autoloadernamespaces[] = "My"

; ============================================================
; PLUGIN RESOURCES
; ============================================================
pluginPaths.App_Resource = APPLICATION_PATH "/../library/app/Resource"

; ============================================================
; HEADER / APP CONFIG
; ============================================================
header.xtoken          = "X-Token"
header.empresanombre   = "AnimalPet"
header.empresaurl      = "www.animalpet.com"
header.version         = "1.0.0"
header.keylocal        = "CAMBIA_ESTA_CLAVE_POR_UNA_SEGURA"


; API Keys — NUNCA subir al repositorio, usar .env o config local
; header.apikey_ia_general = ""

; ============================================================
; ENVIRONMENTS
; ============================================================

; ============================================================
; RUTAS
; ============================================================
resources.router.routes.panel.route                  = "panel"
resources.router.routes.panel.defaults.module        = "panel"
resources.router.routes.panel.defaults.controller    = "index"
resources.router.routes.panel.defaults.action        = "index"

resources.router.routes.registro.route               = "registro"
resources.router.routes.registro.defaults.module     = "registro"
resources.router.routes.registro.defaults.controller = "index"
resources.router.routes.registro.defaults.action     = "index"

resources.router.routes.login.route                  = "login"
resources.router.routes.login.defaults.module        = "login"
resources.router.routes.login.defaults.controller    = "index"
resources.router.routes.login.defaults.action        = "index"

resources.router.routes.mascota-nueva.route                  = "mascota/nueva"
resources.router.routes.mascota-nueva.defaults.module        = "mascota"
resources.router.routes.mascota-nueva.defaults.controller    = "index"
resources.router.routes.mascota-nueva.defaults.action        = "nueva"

resources.router.routes.mascota-mis.route                  = "mascota/mis"
resources.router.routes.mascota-mis.defaults.module        = "mascota"
resources.router.routes.mascota-mis.defaults.controller    = "index"
resources.router.routes.mascota-mis.defaults.action        = "mis"

[staging : production]

[testing : production]
phpSettings.display_startup_errors = 1
phpSettings.display_errors         = 1

[development : production]
phpSettings.display_startup_errors        = 1
phpSettings.display_errors                = 1
resources.frontController.params.displayExceptions = 1
phpSettings.date.timezone                 = America/Bogota